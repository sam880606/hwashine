<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顏料資料分析與座標圖</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 SheetJS (用於讀取 Excel 檔案) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- 標頭與控制區 -->
        <div class="bg-white rounded-2xl shadow-sm p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">🎨 顏料 Hue & Chroma 座標圖分析</h1>
                <p class="text-sm text-gray-500 mt-1">上傳您的 Excel 或 CSV 檔案進行篩選與視覺化。</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">匯入完整 Excel / CSV 資料</label>
                    <input type="file" id="csvFileInput" accept=".csv, .xlsx, .xls" 
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-colors">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">以材質篩選</label>
                    <select id="materialFilter" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                        <option value="ALL">全部 (All)</option>
                        <!-- 選項會透過 JS 動態生成 -->
                    </select>
                </div>
            </div>
        </div>

        <!-- 色系切換區與圖表區 -->
        <div class="bg-white rounded-2xl shadow-sm p-6 flex flex-col">
            <!-- 色系切換按鈕 -->
            <div class="flex flex-wrap gap-2 mb-6 pb-4 border-b border-gray-100" id="colorTabContainer">
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-800 text-white shadow-sm" data-color="ALL">🌈 全色域 (圓形)</button>
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-red-50 hover:text-red-600" data-color="RED">🔴 紅色系</button>
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-amber-50 hover:text-amber-800" data-color="BROWN">🟤 棕色系</button>
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-orange-50 hover:text-orange-600" data-color="ORANGE">🟠 橘色系</button>
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-yellow-50 hover:text-yellow-600" data-color="YELLOW">🟡 黃色系</button>
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-green-50 hover:text-green-600" data-color="GREEN">🟢 綠色系</button>
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-blue-50 hover:text-blue-600" data-color="BLUE">🔵 藍色系</button>
                <button class="color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-purple-50 hover:text-purple-600" data-color="PURPLE">🟣 紫色系</button>
            </div>

            <!-- 圖表容器 (加入 ID 以便動態調整形狀) -->
            <div id="chartContainer" class="relative w-full max-w-[650px] mx-auto aspect-square transition-all duration-500">
                <canvas id="scatterChart"></canvas>
            </div>
        </div>

        <!-- 數據表格區 -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">資料明細 (<span id="rowCount">0</span> 筆)</h2>
                    <button id="clearFiltersBtn" class="text-sm text-blue-600 hover:text-blue-800 transition-colors">清除進階篩選</button>
                </div>
                <!-- 進階效能篩選區塊 -->
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">沖淡色耐光 ≧</label>
                        <input type="number" id="filterTintLight" class="filter-input bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2" placeholder="例: 6">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">本色耐光 ≧</label>
                        <input type="number" id="filterFullLight" class="filter-input bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2" placeholder="例: 7">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">耐溫 ≧</label>
                        <input type="number" id="filterHeat" class="filter-input bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2" placeholder="例: 250">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">耐候 ≧</label>
                        <input type="number" id="filterWeather" class="filter-input bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2" placeholder="例: 4">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">耐遷移 ≧</label>
                        <input type="number" id="filterMigration" class="filter-input bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2" placeholder="例: 4">
                    </div>
                </div>
            </div>
            <div class="overflow-x-auto max-h-[40vh]">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100 sticky top-0">
                        <tr id="tableHeader">
                            <!-- 表頭動態生成 -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 表格內容動態生成 -->
                        <tr>
                            <td colspan="10" class="px-6 py-8 text-center text-gray-400">請先從左上方上傳資料檔案</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 全域變數
        let parsedData = [];
        let headers = [];
        let chartInstance = null;
        let isFirstLoad = true; // 新增：用來追蹤是否為第一次載入檔案
        let materialColumn = '應用'; // 新增：動態記錄材質欄位的名稱
        let currentColorTab = 'ALL'; // 新增：目前選擇的色系視角
        let currentPointBorderColors = []; // 新增：儲存圖表點的原始邊框顏色

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 嘗試自動讀取根目錄下的 pigment.xlsx 或 pigment.csv
            async function loadDefaultData() {
                try {
                    let response = await fetch('pigment.xlsx');
                    if (!response.ok) {
                        // 若找不到 xlsx，退而求其次找 csv
                        response = await fetch('pigment.csv');
                        if (!response.ok) throw new Error('找不到預設檔案 pigment.xlsx 或 pigment.csv');
                    }
                    
                    const buffer = await response.arrayBuffer();
                    const data = new Uint8Array(buffer);
                    // 呼叫 SheetJS 解析二進位資料 (相容 xlsx 與 csv)
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                    processJSONData(jsonData);
                } catch (error) {
                    console.warn('無法自動載入預設檔案 (可能檔案不存在或直接雙擊開啟 HTML 受到瀏覽器安全性限制)，請手動上傳：', error);
                    updateChart([]); // 初始化空圖表
                }
            }
            
            loadDefaultData(); // 執行自動載入
            
            // 監聽下拉選單變化
            document.getElementById('materialFilter').addEventListener('change', updateView);
            
            // 監聽檔案上傳
            document.getElementById('csvFileInput').addEventListener('change', handleFileUpload);

            // 監聽進階篩選數值輸入
            document.querySelectorAll('.filter-input').forEach(input => {
                input.addEventListener('input', updateView);
            });

            // 清除進階篩選按鈕
            document.getElementById('clearFiltersBtn').addEventListener('click', () => {
                document.querySelectorAll('.filter-input').forEach(input => input.value = '');
                updateView();
            });

            // 監聽色系切換按鈕
            document.querySelectorAll('.color-tab').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // 更新按鈕視覺狀態
                    document.querySelectorAll('.color-tab').forEach(b => {
                        b.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200';
                    });
                    
                    const selectedColor = e.target.getAttribute('data-color');
                    currentColorTab = selectedColor;
                    
                    // 根據選擇的顏色給予對應的 Active 樣式
                    if (selectedColor === 'ALL') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-gray-800 text-white shadow-sm';
                    if (selectedColor === 'RED') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-red-500 text-white shadow-sm';
                    if (selectedColor === 'BROWN') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-amber-800 text-white shadow-sm';
                    if (selectedColor === 'ORANGE') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-orange-500 text-white shadow-sm';
                    if (selectedColor === 'YELLOW') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-yellow-400 text-gray-900 shadow-sm';
                    if (selectedColor === 'GREEN') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-green-500 text-white shadow-sm';
                    if (selectedColor === 'BLUE') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-blue-500 text-white shadow-sm';
                    if (selectedColor === 'PURPLE') e.target.className = 'color-tab px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-purple-500 text-white shadow-sm';

                    updateView(); // 重新繪製圖表與表格
                });
            });
        });

        // 處理上傳的檔案
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            // 無論是 Excel 或 CSV，都交由強大的 SheetJS 統一讀取，避免編碼或欄位錯位問題導致抓不到「應用」
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // 自動抓取第一個工作表
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // 將工作表直接轉換為乾淨的 JSON 陣列
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                processJSONData(jsonData);
            };
            reader.readAsArrayBuffer(file);
        }

        // 解析並清理資料 (取代舊的 processCSVString)
        function processJSONData(jsonData) {
            if (!jsonData || jsonData.length === 0) return;

            // 重新整理資料：去除所有欄位名稱和內容的頭尾空白，確保能精準對應
            parsedData = jsonData.map(row => {
                const cleanRow = {};
                for (let key in row) {
                    const cleanKey = key.trim();
                    const val = row[key];
                    cleanRow[cleanKey] = typeof val === 'string' ? val.trim() : val;
                }
                return cleanRow;
            });

            if (parsedData.length > 0) {
                headers = Object.keys(parsedData[0]);
                // 動態偵測材質的欄位名稱 (支援 '應用', '材質', '測試材質' 等)
                materialColumn = headers.find(h => h.includes('材質') || h.includes('應用')) || '應用';
            }

            isFirstLoad = true; // 每次上傳新檔案時，重置為「首次載入」狀態
            populateFilterDropdown();
            updateView();
        }

        // 填充下拉選單
        function populateFilterDropdown() {
            const filterSelect = document.getElementById('materialFilter');
            const currentSelection = filterSelect.value;
            
            // 根據需求：強制只顯示 ALL、PE、PVC 三個選項
            filterSelect.innerHTML = `
                <option value="ALL">全部 (All)</option>
                <option value="PE">PE</option>
                <option value="PVC">PVC</option>
            `;

            // 如果是第一次載入，則預設切換至 PE
            if (isFirstLoad) {
                filterSelect.value = 'PE';
                isFirstLoad = false; // 解除首次狀態，讓使用者之後能自由點選切換
            } 
            // 否則保留原選擇，若原選擇無效則回到 ALL
            else if (['ALL', 'PE', 'PVC'].includes(currentSelection)) {
                filterSelect.value = currentSelection;
            } else {
                filterSelect.value = 'ALL';
            }
        }

        // 輔助函數：從字串中提取數字 (處理 "7~8" 這種格式，會抓取 7)
        function extractNumber(str) {
            if (!str || str === '~') return NaN;
            const match = str.toString().match(/\d+(\.\d+)?/);
            return match ? parseFloat(match[0]) : NaN;
        }

        // 更新圖表與表格視圖
        function updateView() {
            const selectedMaterial = document.getElementById('materialFilter').value;
            
            // 取得進階篩選數值
            const minTintLight = parseFloat(document.getElementById('filterTintLight').value);
            const minFullLight = parseFloat(document.getElementById('filterFullLight').value);
            const minHeat = parseFloat(document.getElementById('filterHeat').value);
            const minWeather = parseFloat(document.getElementById('filterWeather').value);
            const minMigration = parseFloat(document.getElementById('filterMigration').value);
            
            // 過濾資料
            const filteredData = parsedData.filter(row => {
                // 0. 無效的 Hue 或 Chroma 點不顯示
                const hue = parseFloat(row['Hue']);
                const chroma = parseFloat(row['Chroma']);
                if (isNaN(hue) || isNaN(chroma)) return false;

                // 1. 色系篩選 (優先根據「國際色號字首」分類)
                if (currentColorTab !== 'ALL') {
                    const colorCode = (row['色號'] || '').toUpperCase();
                    
                    // 判斷該色號屬於哪個標準色系
                    const isPR = colorCode.startsWith('PR');
                    const isPO = colorCode.startsWith('PO');
                    const isPY = colorCode.startsWith('PY');
                    const isPG = colorCode.startsWith('PG');
                    // 注意 PB 代表 Blue，需排除 PBr(Brown) 與 PBk(Black)
                    const isPB = colorCode.startsWith('PB') && !colorCode.startsWith('PBR') && !colorCode.startsWith('PBK'); 
                    const isPV = colorCode.startsWith('PV');
                    const isPBr = colorCode.startsWith('PBR');
                    
                    const hasStandardPrefix = isPR || isPO || isPY || isPG || isPB || isPV || isPBr;

                    if (hasStandardPrefix) {
                        // 若資料帶有標準前綴，強制依照字首嚴格歸類 (解決 PR 跑到橘色或紫色的問題)
                        if (currentColorTab === 'RED' && !isPR) return false;
                        if (currentColorTab === 'ORANGE' && !isPO) return false;
                        if (currentColorTab === 'YELLOW' && !isPY) return false;
                        if (currentColorTab === 'GREEN' && !isPG) return false;
                        if (currentColorTab === 'BLUE' && !isPB) return false;
                        if (currentColorTab === 'PURPLE' && !isPV) return false;
                        if (currentColorTab === 'BROWN' && !isPBr) return false;
                    } else {
                        // 若完全沒有標準前綴(自訂編號)，才退回使用 Hue/Chroma 角度輔助判定
                        if (currentColorTab === 'RED') {
                            if (!(hue >= 345 || hue <= 35)) return false;
                        } else if (currentColorTab === 'BROWN') {
                            if (!(hue > 35 && hue <= 65 && chroma < 50)) return false;
                        } else if (currentColorTab === 'ORANGE') {
                            if (!(hue > 35 && hue <= 65 && chroma >= 50)) return false;
                        } else if (currentColorTab === 'YELLOW') {
                            if (!(hue > 65 && hue <= 105)) return false;
                        } else if (currentColorTab === 'GREEN') {
                            if (!(hue > 105 && hue <= 200)) return false;
                        } else if (currentColorTab === 'BLUE') {
                            if (!(hue > 200 && hue <= 285)) return false;
                        } else if (currentColorTab === 'PURPLE') {
                            if (!(hue > 285 && hue < 345)) return false;
                        }
                    }
                }

                // 2. 材質篩選
                if (selectedMaterial !== 'ALL' && row[materialColumn] !== selectedMaterial) return false;
                
                // 3. 進階效能篩選 (大於等於)
                if (!isNaN(minTintLight)) {
                    const val = extractNumber(row['沖淡色耐光']);
                    if (isNaN(val) || val < minTintLight) return false;
                }
                if (!isNaN(minFullLight)) {
                    const val = extractNumber(row['本色耐光']);
                    if (isNaN(val) || val < minFullLight) return false;
                }
                if (!isNaN(minHeat)) {
                    const val = extractNumber(row['耐溫']);
                    if (isNaN(val) || val < minHeat) return false;
                }
                if (!isNaN(minWeather)) {
                    const val = extractNumber(row['耐候']);
                    if (isNaN(val) || val < minWeather) return false;
                }
                if (!isNaN(minMigration)) {
                    const val = extractNumber(row['耐遷移']);
                    if (isNaN(val) || val < minMigration) return false;
                }

                return true;
            });

            updateChart(filteredData);
            updateTable(filteredData);
        }

        // 根據 Hue 值計算 HSL 顏色，讓圖表的點直觀呈現色相
        function getColorFromHue(hueStr) {
            const dataHue = parseFloat(hueStr);
            if (isNaN(dataHue)) return 'rgba(100, 100, 100, 0.6)'; // 無效的給灰色
            
            // 顏料的 Hue (CIELAB/LCH 色彩空間) 與網頁 CSS 的 HSL 角度定義不同。
            // 並且修正了 0度~40度 之間的數學插值倒轉問題 (解決 PR53:1 產生的青色錯誤)
            let h = dataHue % 360;
            if (h < 0) h += 360;

            let cssHue = h;
            // 更精準的 LCH 到 HSL 轉換矩陣
            const mapping = [
                [0, -15],   // LCH 0° -> CSS 345° (使用 -15 避免 0~20度 的數學插值越界錯誤)
                [20, 0],    // LCH 20° -> CSS 0° (正紅, 如 PR185, PR262)
                [40, 25],   // LCH 40° -> CSS 25° (橘/暖紅, 如 PR53:1, PO34)
                [90, 55],   // LCH 90° -> CSS 55° (黃)
                [140, 90],  // LCH 140° -> CSS 90° (黃綠)
                [160, 120], // LCH 160° -> CSS 120° (正綠, 修正 PG7)
                [180, 150], // LCH 180° -> CSS 150° (青綠)
                [220, 200], // LCH 220° -> CSS 200° (青藍)
                [270, 240], // LCH 270° -> CSS 240° (正藍)
                [300, 270], // LCH 300° -> CSS 270° (紫)
                [330, 315], // LCH 330° -> CSS 315° (洋紅/桃紅, 修正 PR122, PV19)
                [360, 345]  // LCH 360° -> CSS 345° (循環)
            ];

            // 尋找區間並進行線性轉換
            for (let i = 0; i < mapping.length - 1; i++) {
                const [dataH1, cssH1] = mapping[i];
                const [dataH2, cssH2] = mapping[i+1];
                if (h >= dataH1 && h <= dataH2) {
                    cssHue = cssH1 + (cssH2 - cssH1) * (h - dataH1) / (dataH2 - dataH1);
                    break;
                }
            }

            // 確保計算完的 cssHue 落在 0~360 之間 (把計算中用到的負數角度轉回正數)
            cssHue = (cssHue % 360 + 360) % 360;

            // 使用固定的飽和度和亮度來純粹展現色相
            return `hsla(${cssHue}, 85%, 50%, 0.85)`;
        }

        // 更新 Chart.js 圖表
        function updateChart(data) {
            const ctx = document.getElementById('scatterChart').getContext('2d');
            const chartContainer = document.getElementById('chartContainer');
            
            // 根據不同模式改變容器形狀：圓形(1:1正方形)、長方形(寬螢幕比例)
            if (currentColorTab === 'ALL') {
                chartContainer.classList.add('aspect-square', 'max-w-[650px]');
                chartContainer.style.height = 'auto';
            } else {
                chartContainer.classList.remove('aspect-square', 'max-w-[650px]');
                chartContainer.style.height = '500px'; // 長方形固定高度
            }

            // 找出最大 Chroma 以設定圓形座標的繪製邊界
            let maxChroma = 0;
            data.forEach(row => {
                const c = parseFloat(row['Chroma']);
                if (!isNaN(c) && c > maxChroma) maxChroma = c;
            });
            let maxBound = Math.ceil(maxChroma / 20) * 20;
            if (maxBound < 60) maxBound = 60;
            if (maxBound === 0) maxBound = 100;

            // 準備 Chart.js 格式的 dataset
            const chartDataPoints = [];
            const pointColors = [];
            const pointBorderColors = [];

            data.forEach(row => {
                let hue = parseFloat(row['Hue']);
                let chroma = parseFloat(row['Chroma']);
                
                if (!isNaN(hue) && !isNaN(chroma)) {
                    let finalX, finalY;

                    if (currentColorTab === 'ALL') {
                        // 【全色域模式】：極座標轉換 (Hue為角度，Chroma為半徑)
                        const hueRad = hue * Math.PI / 180;
                        finalX = chroma * Math.cos(hueRad);
                        finalY = chroma * Math.sin(hueRad);
                    } else {
                        // 【單一色系模式】：長方形笛卡爾座標 (X=Hue, Y=Chroma)
                        // 【修正】確保所有帶紅/洋紅的 PR (大於 300 度) 都能轉為負數連續顯示
                        // 例如 PR122 (Hue:338) 會轉為 -22，與 PR185 (Hue:2) 的距離拉近
                        if (currentColorTab === 'RED' && hue >= 300) {
                            hue = hue - 360; 
                        }
                        finalX = hue;
                        finalY = chroma;
                    }

                    chartDataPoints.push({
                        x: finalX,
                        y: finalY,
                        raw: row // 保存原始資料供 Tooltip 使用
                    });
                    
                    const color = getColorFromHue(row['Hue']); // 使用原始 Hue 來取色
                    pointColors.push(color);
                    pointBorderColors.push(color.replace('0.85', '1.0'));
                }
            });

            currentPointBorderColors = [...pointBorderColors]; // 備份原始邊框顏色

            if (chartInstance) {
                chartInstance.destroy();
            }

            // 自定義插件：繪製同心圓與角度線 (圓形色彩空間背景)
            const polarGridPlugin = {
                id: 'polarGrid',
                beforeDraw: (chart) => {
                    // 如果不是全色域模式，就不畫同心圓
                    if (currentColorTab !== 'ALL') return;

                    const ctx = chart.ctx;
                    const xAxis = chart.scales.x;
                    const yAxis = chart.scales.y;
                    const centerX = xAxis.getPixelForValue(0);
                    const centerY = yAxis.getPixelForValue(0);
                    
                    ctx.save();
                    ctx.strokeStyle = '#e5e7eb'; // 網格線顏色
                    ctx.lineWidth = 1;
                    
                    // 畫同心圓 (每 20 單位畫一圈)
                    for (let i = 20; i <= maxBound; i += 20) {
                        const r = Math.abs(xAxis.getPixelForValue(i) - centerX);
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, r, 0, 2 * Math.PI);
                        ctx.stroke();
                        
                        // Chroma 標籤 (畫在上半部的 Y 軸上)
                        ctx.fillStyle = '#9ca3af';
                        ctx.font = '11px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(i.toString(), centerX, centerY - r + 12);
                    }

                    // 畫放射狀色相線 (每 45 度)
                    const angles = [0, 45, 90, 135, 180, 225, 270, 315];
                    ctx.fillStyle = '#6b7280';
                    ctx.font = '12px sans-serif';
                    ctx.textBaseline = 'middle';
                    
                    angles.forEach(angle => {
                        const rad = angle * Math.PI / 180;
                        const xEnd = xAxis.getPixelForValue(maxBound * Math.cos(rad));
                        const yEnd = yAxis.getPixelForValue(maxBound * Math.sin(rad));
                        
                        // 畫線
                        ctx.beginPath();
                        ctx.moveTo(centerX, centerY);
                        ctx.lineTo(xEnd, yEnd);
                        ctx.stroke();
                        
                        // 畫角度文字
                        const lx = xAxis.getPixelForValue((maxBound * 1.08) * Math.cos(rad));
                        const ly = yAxis.getPixelForValue((maxBound * 1.08) * Math.sin(rad));
                        
                        ctx.textAlign = (angle > 90 && angle < 270) ? 'right' : (angle === 90 || angle === 270) ? 'center' : 'left';
                        ctx.fillText(`${angle}°`, lx, ly);
                    });
                    
                    ctx.restore();
                }
            };

            // 設定 Chart 顯示選項 (圓形與長方形的 X/Y 軸不同)
            let scalesConfig = {};
            if (currentColorTab === 'ALL') {
                scalesConfig = {
                    x: { display: false, min: -maxBound * 1.15, max: maxBound * 1.15 },
                    y: { display: false, min: -maxBound * 1.15, max: maxBound * 1.15 }
                };
            } else {
                // 單色系模式：開啟 XY 軸、自動延展範圍，並加入標籤
                scalesConfig = {
                    x: {
                        display: true,
                        title: { display: true, text: 'Hue (色口) ➔', font: { size: 14, weight: 'bold' } },
                        grid: { color: '#f3f4f6' }
                    },
                    y: {
                        display: true,
                        title: { display: true, text: 'Chroma (飽和度) ➔', font: { size: 14, weight: 'bold' } },
                        grid: { color: '#f3f4f6' },
                        beginAtZero: false // 自動聚焦在資料區間
                    }
                };
            }

            chartInstance = new Chart(ctx, {
                type: 'scatter',
                plugins: [polarGridPlugin], // 載入我們的自定義圓形網格
                data: {
                    datasets: [{
                        label: '顏料資料點',
                        data: chartDataPoints,
                        backgroundColor: pointColors,
                        borderColor: [...pointBorderColors],
                        borderWidth: chartDataPoints.map(() => 1),
                        pointRadius: chartDataPoints.map(() => 8),
                        pointHoverRadius: 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (event, elements) => {
                        // 當使用者點擊圖表上的點時，同步高亮下方的表格列 (但不強制往下滾動)
                        if (elements.length > 0) {
                            const idx = elements[0].index;
                            highlightChartPoint(idx);
                            highlightTableRow(idx, true); // 傳入 true 防止網頁往下滾動
                        } else {
                            // 點擊空白處取消高亮
                            highlightChartPoint(-1);
                            highlightTableRow(-1, true);
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#1f2937',
                            bodyColor: '#374151',
                            borderColor: '#e5e7eb',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6,
                            usePointStyle: true,
                            callbacks: {
                                label: function(context) {
                                    const row = context.raw.raw;
                                    return [
                                        `色號: ${row['色號'] || 'N/A'}`,
                                        `材質: ${row[materialColumn] || 'N/A'}`,
                                        `Hue (色相): ${row['Hue']}°`,
                                        `Chroma (彩度): ${row['Chroma']}`,
                                        `本色耐光: ${row['本色耐光'] || '~'}`,
                                        `耐溫: ${row['耐溫'] || '~'}`
                                    ];
                                }
                            }
                        }
                    },
                    scales: scalesConfig
                }
            });
        }

        // 新增：高亮圖表上的特定點
        function highlightChartPoint(index) {
            if (!chartInstance) return;
            const dataset = chartInstance.data.datasets[0];
            const count = dataset.data.length;
            
            // 產生新的樣式陣列 (預設值)
            const radii = new Array(count).fill(8);
            const borderWidths = new Array(count).fill(1);
            const borderColors = [...currentPointBorderColors];
            
            if (index >= 0 && index < count) {
                radii[index] = 18; // 放大半徑使其突出
                borderWidths[index] = 4; // 加粗邊框
                borderColors[index] = '#111827'; // 給予深色外框加強視覺

                // 程式化觸發 Tooltip 顯示
                chartInstance.tooltip.setActiveElements([{ datasetIndex: 0, index: index }], { x: 0, y: 0 });
            } else {
                chartInstance.tooltip.setActiveElements([], { x: 0, y: 0 });
            }
            
            dataset.pointRadius = radii;
            dataset.pointBorderWidth = borderWidths;
            dataset.borderColor = borderColors;
            
            chartInstance.update();
        }

        // 新增：高亮表格中的特定列 (加入 preventScroll 參數控制是否捲動)
        function highlightTableRow(index, preventScroll = false) {
            const rows = document.querySelectorAll('#tableBody tr[data-index]');
            rows.forEach(tr => {
                const idx = parseInt(tr.dataset.index);
                if (idx === index) {
                    tr.className = 'border-b transition-colors cursor-pointer bg-blue-100 ring-2 ring-inset ring-blue-500 relative z-10';
                    // 若是由上方圖表觸發 (preventScroll=true)，則不執行往下捲動
                    if (!preventScroll) {
                        tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    const bgClass = idx % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                    tr.className = `border-b transition-colors cursor-pointer hover:bg-blue-50 ${bgClass}`;
                }
            });
        }

        // 更新下方資料表格
        function updateTable(data) {
            document.getElementById('rowCount').textContent = data.length;
            
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            
            // 清空舊內容
            thead.innerHTML = '';
            tbody.innerHTML = '';

            // 定義要隱藏不顯示的欄位
            const hiddenColumns = ['Hue', 'Chroma'];

            // 生成表頭
            headers.forEach(h => {
                if (hiddenColumns.includes(h)) return; // 跳過隱藏欄位

                const th = document.createElement('th');
                th.className = 'px-6 py-3 whitespace-nowrap';
                th.textContent = h;
                thead.appendChild(th);
            });

            // 生成內容列
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.dataset.index = index; // 記錄索引以便對應圖表
                const bgClass = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                tr.className = `border-b transition-colors cursor-pointer hover:bg-blue-50 ${bgClass}`;
                
                // 加入點擊事件：點擊表格列時高亮圖表與表格本身
                tr.addEventListener('click', () => {
                    highlightTableRow(index);
                    highlightChartPoint(index);
                    
                    // 將畫面稍微往上捲，確保圖表在視野內
                    document.getElementById('chartContainer').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                });
                
                headers.forEach(h => {
                    if (hiddenColumns.includes(h)) return; // 跳過隱藏欄位

                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 whitespace-nowrap';
                    td.textContent = row[h] || '';
                    
                    // 如果是色號，加上顏色標籤
                    if (h === '色號' && row['Hue'] && !isNaN(parseFloat(row['Hue']))) {
                        const colorSpan = document.createElement('span');
                        colorSpan.className = 'inline-block w-3 h-3 rounded-full mr-2 align-middle';
                        colorSpan.style.backgroundColor = getColorFromHue(row['Hue']);
                        td.insertBefore(colorSpan, td.firstChild);
                    }
                    
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
